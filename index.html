<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaji — SDET, Automation & AI Testing</title>
    <meta name="description"
        content="Balaji — SDET with 8+ years building reliable automation frameworks across Playwright, Selenium, API testing, AWS and AI-assisted testing.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="/assets/fonts.css">
    <link rel="stylesheet" href="/assets/tailwind.css">
    <link rel="stylesheet" href="/assets/site.css">
</head>

<body class="bg-dot-pattern text-gray-900 antialiased min-h-screen selection:bg-violet-100">

    <!-- ===== Floating Navbar ===== -->
    <div class="fixed left-1/2 -translate-x-1/2 w-[90%] max-w-[800px] z-50 top-[1.2em] md:top-[2em]" data-nav>
        <nav class="nav-card">
            <div class="h-[60px] flex items-center justify-between px-3">
                <button type="button" class="hamburger p-2 -ml-1 cursor-pointer" data-nav-toggle aria-label="Open menu"
                    aria-expanded="false" aria-controls="nav-links">
                    <span></span><span></span><span></span>
                </button>
                <a href="/" class="font-hand text-3xl font-bold tracking-tight absolute left-1/2 -translate-x-1/2">Balaji</a>
                <a href="/resume.pdf" target="_blank"
                    class="bg-[#111] text-white text-sm font-medium px-4 h-[40px] inline-flex items-center rounded-[0.55rem] hover:bg-gray-800 transition-colors cursor-pointer">
                    Resume
                </a>
            </div>
            <div class="nav-panel px-3" id="nav-links">
                <ul class="font-hand text-2xl py-2 flex flex-col md:flex-row md:justify-center gap-1 md:gap-6">
                    <li><a data-nav-link href="/" class="block px-2 py-1 hover:text-violet-600 transition-colors">Home</a></li>
                    <li><a data-nav-link href="/about" class="block px-2 py-1 hover:text-violet-600 transition-colors">About</a></li>
                    <li><a data-nav-link href="/experience" class="block px-2 py-1 hover:text-violet-600 transition-colors">Experience</a></li>
                    <li><a data-nav-link href="/projects" class="block px-2 py-1 hover:text-violet-600 transition-colors">Projects</a></li>
                    <li><a data-nav-link href="/contact" class="block px-2 py-1 hover:text-violet-600 transition-colors">Contact</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- ===== Hero ===== -->
    <main class="relative min-h-screen flex flex-col items-center justify-center px-6 overflow-hidden">

        <!-- Scattered photos -->
        <div class="photo-frame hidden sm:block absolute left-[6%] top-[22%] w-36 rotate-[-8deg]">
            <img src="/assets/img/portrait.jpg" alt="Balaji portrait" class="w-full h-40 object-cover grayscale">
        </div>
        <div class="photo-frame hidden md:block absolute right-[8%] top-[20%] w-32 rotate-[7deg]" aria-hidden="true">
            <div class="w-full h-40 bg-gray-100 grid place-items-center text-gray-300 font-mono text-xs">swap me</div>
        </div>
        <div class="photo-frame hidden lg:block absolute left-[12%] bottom-[14%] w-28 rotate-[6deg]" aria-hidden="true">
            <div class="w-full h-32 bg-gray-100 grid place-items-center text-gray-300 font-mono text-xs">swap me</div>
        </div>

        <!-- Text block -->
        <div class="relative z-10 text-center max-w-2xl">
            <p class="kicker text-xl mb-1">Hi, I'm</p>
            <h1 class="font-hand font-bold leading-none text-[clamp(5rem,18vw,9rem)] mb-2">Balaji</h1>
            <p class="font-mono text-lg sm:text-xl text-gray-600 mb-6">
                a <span class="caret text-gray-900 font-semibold" data-typewriter='["SDET","Automation Engineer","AI/API Tester","App Developer"]'>SDET</span>
            </p>
            <p class="font-mono text-sm sm:text-base text-gray-500 max-w-md mx-auto mb-9">
                Building reliable systems through quality. Explore who I am and what I do, in one place.
            </p>
            <div class="flex items-center justify-center gap-5">
                <a href="/about"
                    class="font-hand text-2xl border-[1.5px] border-[#111] rounded-full px-7 py-1.5 hover:bg-[#111] hover:text-white transition-colors cursor-pointer">
                    About Me
                </a>
                <a href="/contact" class="font-mono text-sm text-gray-600 hover:text-black transition-colors underline underline-offset-4 cursor-pointer inline-block py-2">Contact</a>
            </div>
        </div>

        <!-- Sticker note -->
        <div class="sticker hidden sm:block absolute right-[10%] bottom-[16%] text-sm px-4 py-2 text-gray-700">
            8+ yrs in QA
        </div>
    </main>

    <!-- ===== Footer ===== -->
    <footer class="border-t border-gray-200">
        <div class="max-w-4xl mx-auto px-6 py-10 flex flex-col sm:flex-row items-center justify-between gap-5">
            <a href="/" class="flex items-center gap-2 cursor-pointer">
                <img src="/assets/img/logo-light.svg" alt="Balaji logo" class="h-8 w-8 object-contain">
                <span class="font-hand font-bold text-2xl leading-none">Balaji</span>
            </a>
            <p class="font-mono text-xs text-gray-400">© <span data-year>2026</span> Balaji · Built with care.</p>
            <div class="flex gap-4 font-mono text-xs text-gray-500">
                <a href="https://linkedin.com/in/balaji16s" target="_blank" rel="noopener" class="inline-block py-2 hover:text-black transition-colors cursor-pointer">LinkedIn</a>
                <a href="https://github.com/balaji16s" target="_blank" rel="noopener" class="inline-block py-2 hover:text-black transition-colors cursor-pointer">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="/assets/site.js"></script>
</body>

</html>
